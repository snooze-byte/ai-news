services:
  - type: web
    name: ai-daily-news
    env: node
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node dist/server/index.js
    envVars:
      - key: PORT
        value: 3000
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.deepseek.com/v1
      - key: OPENAI_MODEL
        value: deepseek-chat
      - key: CRON_SCHEDULE
        value: "0 8 * * *"
      - key: NEWS_FETCH_COUNT
        value: "10"
